# ============================================
# Nginx 站点配置（优化版）
# 自动生成，请勿手动修改
# ============================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DOMAIN};

    # ============================================
    # SSL 证书配置
    # ============================================
    ssl_certificate ${CERT_PATH}/fullchain.pem;
    ssl_certificate_key ${CERT_PATH}/privkey.pem;
    
    # SSL 协议和加密套件
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH;
    
    # SSL 会话缓存（提升 HTTPS 性能）
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # SSL Stapling（OCSP）
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ============================================
    # 安全响应头
    # ============================================
    # HSTS（强制 HTTPS）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # 防止点击劫持
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # 防止 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;
    
    # XSS 保护
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 引用来源策略
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # 内容安全策略（根据实际需求调整）
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:;" always;
    
    # 隐藏 Nginx 版本号
    server_tokens off;

    # ============================================
    # 【修复 2】缓冲区优化（高性能配置）
    # ============================================
    # 客户端请求缓冲
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;
    
    # 代理缓冲区（关键！）
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 32 8k;
    proxy_busy_buffers_size 16k;
    proxy_temp_file_write_size 16k;
    
    # 代理超时设置
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # FastCGI 缓冲（如果使用 PHP）
    fastcgi_buffer_size 8k;
    fastcgi_buffers 32 8k;
    fastcgi_busy_buffers_size 16k;

    # ============================================
    # 静态文件配置
    # ============================================
    root /usr/share/nginx/${DOMAIN};
    index index.html index.htm;
    
    # 文件缓存优化
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ============================================
    # 【修复 2】Aria2 RPC 反向代理（优化版）
    # ============================================
    location /jsonrpc {
        # 可选：限制访问来源（取消注释并替换 YOUR_IP）
        # allow YOUR_HOME_IP;
        # deny all;
        
        # 使用上游服务器或 IP:Port (由脚本动态生成)
        proxy_pass http://${ARIA2_PROXY_TARGET}/jsonrpc;
        
        # HTTP/WebSocket 连接头部 (由脚本动态生成)
        ${ARIA2_HEADERS}
        
        # 基础代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置（适配长轮询）
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 【修复 2】代理缓冲优化
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
        
        # 禁用缓存（RPC 实时性要求）
        proxy_cache_bypass 1;
        proxy_no_cache 1;
    }
    
    # ============================================
    # 【修复 2】V2Ray WebSocket 反向代理（优化版）
    # ============================================
    location /${V2RAY_URL} {
        # 使用上游服务器或 IP:Port (由脚本动态生成)
        proxy_pass http://${V2RAY_PROXY_TARGET};
        
        # 基础代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 必须配置 (由脚本动态生成)
        ${V2RAY_HEADERS}
        
        # 【修复 2】WebSocket 超时设置（长连接）
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        
        # 【修复 2】禁用代理缓冲（WebSocket 实时性）
        proxy_buffering off;
        
        # 重定向处理
        proxy_redirect off;
    }
    
    # ============================================
    # 错误页面
    # ============================================
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
    
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
    
    # ============================================
    # 安全：隐藏敏感文件
    # ============================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ============================================
    # 日志配置
    # ============================================
    access_log /var/log/nginx/${DOMAIN}_access.log;
    error_log /var/log/nginx/${DOMAIN}_error.log warn;
}

# ============================================
# HTTP 到 HTTPS 重定向
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};
    
    # ACME 证书验证路径（Let's Encrypt）
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/${DOMAIN};
    }
    
    # 其他所有请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}
